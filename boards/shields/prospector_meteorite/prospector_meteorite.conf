# Prospector Meteorite shield — base configuration.
#
# Single-keyboard dedicated layout, no touch, no scanner-side settings UI.

# ===== BLE observer for keyboard ADV =====
CONFIG_BT=y
CONFIG_BT_OBSERVER=y

# ===== Display + LVGL =====
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_LVGL=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Dedicated display work queue
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# LVGL memory + draw buffer
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_VDB_SIZE=100

# LVGL widgets used by meteorite_layout
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y

# LVGL Montserrat fonts used by meteorite_layout
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_28=y

# Main thread stack
CONFIG_MAIN_STACK_SIZE=4096

# ===== Scanner mode =====
CONFIG_PROSPECTOR_MODE_SCANNER=y

# ===== USB CDC (logging in Phase 1, host rate-limit ingress in Phase 3) =====
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Prospector Meteorite"
CONFIG_USB_DEVICE_VID=0x2886
CONFIG_USB_DEVICE_PID=0x802F
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ===== Hardware (matches prospector_scanner) =====
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_PWM=n

# ===== ZMK Studio not relevant for scanner side =====
CONFIG_ZMK_STUDIO=n

# Power / LED subsystems
CONFIG_PM_DEVICE=n
CONFIG_LED=n

# Split off (scanner)
CONFIG_ZMK_SPLIT=n

# Touch / sensor off (Meteorite layout has no swipe nav and runs without ALS)
CONFIG_I2C=n
CONFIG_INPUT=n
CONFIG_SENSOR=n

# ===== Logging =====
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=4

# Fault dump for crash debugging
CONFIG_FAULT_DUMP=2
CONFIG_EXTRA_EXCEPTION_INFO=y
