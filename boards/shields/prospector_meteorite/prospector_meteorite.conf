# Prospector Meteorite shield — dedicated single-keyboard build.
#
# Derived from the proven prospector_scanner default conf
# (zmk-config-prospector/config/prospector_scanner.conf). Meteorite removes
# the touch / multi-keyboard / channel UI but keeps the same hardware
# bring-up (ST7789V + PWM backlight + I2C bus, BLE observer).

# ============== Display Configuration ==============
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_LVGL=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# LVGL memory pool
CONFIG_LV_Z_MEM_POOL_SIZE=32768

# Double-buffered VDB to reduce flicker
CONFIG_LV_Z_DOUBLE_VDB=y
CONFIG_LV_Z_VDB_SIZE=30

# Display thread stack
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# FPU context sharing between threads (avoids FPU register corruption on
# context switch — meteorite_layout uses snprintf with float-like ops)
CONFIG_FPU_SHARING=y

# Stack sentinel for early overflow detection
CONFIG_STACK_SENTINEL=y

# ============== LVGL widgets used by meteorite_layout ==============
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_USE_IMAGE=y

# Montserrat fonts used by meteorite_layout
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_28=y

# ============== Scanner mode (single keyboard) ==============
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_PROSPECTOR_MODE_SCANNER=y
CONFIG_PROSPECTOR_MAX_LAYERS=10
CONFIG_PROSPECTOR_SCANNER_CHANNEL=0

# Phase 2: receive v2 status advertisement frames from the keyboard
# (layer name list + Meteorite custom config: OS / CPI / scroll layers).
# v2 frames ride the same legacy ADV transport as v1 (just a different
# service UUID, 0xABCE), so no BT_EXT_ADV needed on either side.
CONFIG_PROSPECTOR_STATUS_ADV_V2_EXT=y

# Meteorite has no touch / no swipe nav
CONFIG_PROSPECTOR_TOUCH_ENABLED=n

# ============== USB CDC (logging out + Phase 3a rate-limit ingress in) =====
# device -> host : zephyr,console (Zephyr logs)
# host -> device : line protocol consumed by host_rate_rx.c
# Both share the same single CDC ACM endpoint.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Prospector Meteorite"
CONFIG_USB_DEVICE_VID=0x2886
CONFIG_USB_DEVICE_PID=0x802F
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ============== Hardware ==============
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y
# I2C kept on so brightness_control.c's DT_NODE_HAS_STATUS guard compiles
# cleanly even though we don't use the touch panel or ambient light sensor.
CONFIG_I2C=y

# ============== Disable optional features ==============
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_STUDIO=n
CONFIG_PM_DEVICE=n
CONFIG_PROSPECTOR_BATTERY_SUPPORT=n
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n

# ============== Logging ==============
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=4

# Fault dump for crash debugging
CONFIG_FAULT_DUMP=2
CONFIG_EXTRA_EXCEPTION_INFO=y
